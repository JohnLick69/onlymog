<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>onlymog</title>
<link rel="icon" type="image/png" href="onlymog.PNG">

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center}
#lock{position:fixed;inset:0;background:#f3f3f3;color:#111;display:flex;align-items:center;justify-content:center;z-index:9999}
.box{background:white;border:1px solid #ccc;padding:18px;width:260px;text-align:left}
.box input{width:100%;padding:7px;margin:8px 0;border:1px solid #aaa}
.box button{padding:6px 12px;border:1px solid #999;background:#eee}
.logo{width:130px;margin:25px auto 10px;display:block}
h1{letter-spacing:7px}
.wrap{max-width:1000px;margin:auto;padding:20px;display:grid;grid-template-columns:1fr auto 1fr;gap:22px;align-items:center}
.card{background:#111;border:1px solid #333;border-radius:14px;overflow:hidden}
.card img{width:100%;height:520px;object-fit:cover;object-position:center top;display:block}
.name{padding:14px;font-weight:bold;letter-spacing:2px}
.vote{margin-bottom:16px;padding:11px 28px;border-radius:999px;border:0;background:#fff;color:#000;font-weight:bold}
.vs{font-size:70px;font-weight:bold}
.winner{border:3px solid white}
.loser{opacity:.4;filter:grayscale(1)}
#result{margin:20px;color:#aaa;letter-spacing:3px}

@media(max-width:750px){
  .wrap{grid-template-columns:1fr}
  .vs{font-size:45px}
  .card img{height:auto;aspect-ratio:3/4}
}
</style>
</head>

<body>

<div id="lock">
  <div class="box">
    <label>Password</label>
    <input id="pass" type="password">
    <button onclick="unlock()">Submit</button>
  </div>
</div>

<img class="logo" src="onlymog.PNG">
<h1>MOG OFF</h1>

<div class="wrap">
  <div id="jai" class="card">
    <img src="IMG_1085.png">
    <div class="name">JEWISH JAI</div>
    <button class="vote" onclick="vote('jai')">VOTE</button>
  </div>

  <div class="vs">VS</div>

  <div id="leo" class="card">
    <img src="IMG_1086.png">
    <div class="name">JEWISH LEO</div>
    <button class="vote" onclick="vote('leo')">VOTE</button>
  </div>
</div>

<div id="result"></div>

<script>
function unlock(){
  if(document.getElementById("pass").value==="JEWISH"){
    document.getElementById("lock").style.display="none";
  }
}

function vote(w){
  const jai=document.getElementById("jai");
  const leo=document.getElementById("leo");
  jai.className="card";
  leo.className="card";

  if(w==="jai"){
    jai.classList.add("winner");
    leo.classList.add("loser");
    result.innerText="JEWISH JAI WINS";
  }else{
    leo.classList.add("winner");
    jai.classList.add("loser");
    result.innerText="JEWISH LEO WINS";
  }
}
</script>

</body>
</html>

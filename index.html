<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>onlymog</title>
<link rel="icon" type="image/png" href="data:image/png;base64,REPLACE_WITH_YOUR_LOGO_BASE64">
<link rel="apple-touch-icon" href="data:image/png;base64,REPLACE_WITH_YOUR_LOGO_BASE64">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #000;
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
  min-height: 100vh;
}

#lock {
  position: fixed;
  inset: 0;
  background: #f4f4f4;
  color: #111;
  z-index: 9999;
  display: flex;
  justify-content: center;
  align-items: center;
}

.lock-box {
  width: 280px;
  background: #fff;
  border: 1px solid #cfcfcf;
  padding: 18px;
  font-size: 13px;
}

.lock-box label {
  display: block;
  margin-bottom: 6px;
}

.lock-box input {
  width: 100%;
  padding: 7px;
  border: 1px solid #aaa;
  margin-bottom: 9px;
}

.lock-box button {
  padding: 6px 12px;
  border: 1px solid #999;
  background: #eee;
  color: #111;
  cursor: pointer;
}

#error {
  display: none;
  color: #900;
  font-size: 12px;
  margin-top: 8px;
}

.header {
  padding: 28px 20px 10px;
  text-align: center;
}

.logo {
  width: 150px;
  height: 150px;
  object-fit: contain;
}

.title {
  margin-top: 12px;
  font-size: clamp(34px, 7vw, 72px);
  letter-spacing: 8px;
  font-weight: 900;
}

.subtitle {
  margin-top: 10px;
  color: #aaa;
  font-size: 12px;
  letter-spacing: 4px;
  text-transform: uppercase;
}

.wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px 18px 70px;
}

.battle {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 22px;
  align-items: center;
}

.card {
  background: #0d0d0d;
  border: 1px solid #333;
  border-radius: 16px;
  overflow: hidden;
  transition: 0.2s ease;
}

.card.winner {
  border-color: #fff;
  box-shadow: 0 0 0 2px #fff, 0 0 34px rgba(255,255,255,.15);
}

.card.loser {
  opacity: .42;
  filter: grayscale(.8);
}

.card img {
  width: 100%;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  object-position: center top;
  display: block;
}

.info {
  padding: 16px;
  text-align: center;
  border-top: 1px solid #222;
}

.name {
  font-size: 19px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 13px;
}

.vote {
  width: 150px;
  max-width: 100%;
  border: none;
  border-radius: 999px;
  background: #fff;
  color: #000;
  padding: 11px 18px;
  font-weight: 900;
  letter-spacing: 2px;
  cursor: pointer;
}

.vote:hover {
  background: #ddd;
}

.vs {
  font-size: clamp(42px, 7vw, 90px);
  font-weight: 900;
}

#result {
  min-height: 25px;
  margin-top: 24px;
  text-align: center;
  color: #aaa;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.reset {
  display: block;
  margin: 22px auto 0;
  border: 1px solid #333;
  border-radius: 999px;
  background: transparent;
  color: #aaa;
  padding: 10px 22px;
  cursor: pointer;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.reset:hover {
  color: #fff;
  border-color: #fff;
}

@media (max-width: 760px) {
  .battle {
    grid-template-columns: 1fr;
  }

  .vs {
    text-align: center;
    font-size: 44px;
  }

  .logo {
    width: 120px;
    height: 120px;
  }
}
</style>
</head>

<body>

<div id="lock">
  <div class="lock-box">
    <label for="pass">Password</label>
    <input id="pass" type="password" autocomplete="current-password" />
    <button onclick="unlock()">Submit</button>
    <div id="error">Incorrect password.</div>
  </div>
</div>

<header class="header">
  <img class="logo" src="REPLACE_WITH_LOGO_BASE64">
  <div class="title">MOG OFF</div>
  <div class="subtitle">pick who wins head to head</div>
</header>

<main class="wrap">
  <section class="battle">
    <article id="jai" class="card">
      <img src="REPLACE_WITH_JAI_BASE64">
      <div class="info">
        <div class="name">Jewish Jai</div>
        <button class="vote" onclick="vote('jai')">Vote</button>
      </div>
    </article>

    <div class="vs">VS</div>

    <article id="leo" class="card">
      <img src="REPLACE_WITH_LEO_BASE64">
      <div class="info">
        <div class="name">Jewish Leo</div>
        <button class="vote" onclick="vote('leo')">Vote</button>
      </div>
    </article>
  </section>

  <div id="result"></div>
  <button class="reset" onclick="resetVote()">Reset</button>
</main>

<script>
const PASSWORD = "JEWISH";

function unlock() {
  const pass = document.getElementById("pass");
  const error = document.getElementById("error");

  if (pass.value === PASSWORD) {
    sessionStorage.setItem("onlymogUnlocked", "true");
    document.getElementById("lock").style.display = "none";
  } else {
    error.style.display = "block";
    pass.value = "";
    pass.focus();
  }
}

document.getElementById("pass").addEventListener("keydown", function(e) {
  if (e.key === "Enter") unlock();
});

if (sessionStorage.getItem("onlymogUnlocked") === "true") {
  document.getElementById("lock").style.display = "none";
}

function vote(winner) {
  const jai = document.getElementById("jai");
  const leo = document.getElementById("leo");
  const result = document.getElementById("result");

  jai.classList.remove("winner", "loser");
  leo.classList.remove("winner", "loser");

  if (winner === "jai") {
    jai.classList.add("winner");
    leo.classList.add("loser");
    result.textContent = "Jewish Jai wins";
  } else {
    leo.classList.add("winner");
    jai.classList.add("loser");
    result.textContent = "Jewish Leo wins";
  }
}

function resetVote() {
  document.getElementById("jai").classList.remove("winner", "loser");
  document.getElementById("leo").classList.remove("winner", "loser");
  document.getElementById("result").textContent = "";
}
</script>

</body>
</html>

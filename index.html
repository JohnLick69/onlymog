<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>onlymog</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

/* PASSWORD */
#lock {
  position:fixed;
  inset:0;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box {
  background:white;
  padding:20px;
  border:1px solid #ccc;
}

.box input {
  width:100%;
  padding:6px;
  margin-top:5px;
}

.container {
  padding:40px;
}

.card {
  display:inline-block;
  margin:20px;
}

.card img {
  width:300px;
  height:400px;
  object-fit:cover;
}

button {
  padding:10px 20px;
  margin-top:10px;
  background:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="lock">
  <div class="box">
    <div>Password</div>
    <input id="pass" type="password">
    <button onclick="unlock()">Enter</button>
  </div>
</div>

<div class="container">

<div class="card">
  <img src="https://imgur.com/a/0SZXFkC">
  <div>JEWISH JAI</div>
  <button onclick="alert('JAI WINS')">VOTE</button>
</div>

<div class="card">
  <img src="https://imgur.com/a/Y06Mwca">
  <div>JEWISH LEO</div>
  <button onclick="alert('LEO WINS')">VOTE</button>
</div>

</div>

<script>
function unlock(){
  if(document.getElementById("pass").value==="JEWISH"){
    document.getElementById("lock").style.display="none";
  }
}
</script>

</body>
</html>
